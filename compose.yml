services:

  authz-db:
    image: postgres:18.4
    command:
      - postgres
      - -c
      - max_connections=250
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=16MB
      - -c
      - random_page_cost=1.1
    environment:
      POSTGRES_USER: authz
      POSTGRES_PASSWORD: "${PG_PASSWORD:-authz}"
      POSTGRES_DB: authz
      # Passed to db/security/initdb/01_authenticator.sh to set the service
      # login-role passwords on first boot — must match the pgauthzd DATABASE_URLs
      # (compose-authzen.yml). Default to the dev password; override via .env
      # (see .env.example).
      AUTHZEN_DIRECT_PASSWORD: "${AUTHZEN_DIRECT_PASSWORD:-authz}"
      PGAUTHZD_RW_PASSWORD: "${PGAUTHZD_RW_PASSWORD:-authz}"
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authz"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      # Named volume — no :z (that SELinux relabel flag is for bind mounts;
      # Docker manages a named volume's SELinux context itself).
      - authz-db-data:/var/lib/postgresql
      # Creates the service LOGIN roles (authzen_direct, pgauthzd_rw) on
      # first init, before the services connect (they exit if their login role
      # is missing; roles.sql — run later by init.sh — adds the grants).
      - ./db/security/initdb:/docker-entrypoint-initdb.d:ro

  # OPA is OPT-IN — not part of the default stack. The default is OPA-free:
  # pgauthzd answers directly from PostgreSQL (compose-authzen.yml — the
  # decision-only reader + full writer) with the engine's conditions (SQL /
  # optional CEL) for ABAC. To add policy-as-code (Rego), enable the OPA overlay:
  #   ./start.sh --opa           (compose-opa.yml: OPA sidecar + OPA-fronted gateway)
  # PostgREST has been removed entirely — OPA, when enabled, calls back into
  # pgauthzd's native /pgauthz/v1 API, never PostgREST.

volumes:
  authz-db-data:
    name: authz-pg-db-data
