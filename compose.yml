services:

  authz-db:
    image: postgres:18.3
    command:
      - postgres
      - -c
      - max_connections=250
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=16MB
      - -c
      - random_page_cost=1.1
    environment:
      POSTGRES_USER: authz
      POSTGRES_PASSWORD: authz
      POSTGRES_DB: authz
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authz"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      # Named volume — no :z (that SELinux relabel flag is for bind mounts;
      # Docker manages a named volume's SELinux context itself).
      - authz-db-data:/var/lib/postgresql
      # Creates the authz_authenticator login role on first init, before
      # PostgREST connects (it exits if its login role is missing).
      - ./db/security/initdb:/docker-entrypoint-initdb.d:ro

  postgrest:
    image: postgrest/postgrest:v14.13
    environment:
      # Dedicated non-superuser authenticator (created by db/security/roles.sql).
      # Connecting as a superuser would bypass namespace access control.
      PGRST_DB_URI: postgres://authz_authenticator:authz@authz-db:5432/authz
      PGRST_DB_ANON_ROLE: api_anon
      PGRST_DB_SCHEMAS: authz
      PGRST_DB_POOL: "100"
      PGRST_DB_POOL_ACQUISITION_TIMEOUT: "10"
      PGRST_SERVER_PORT: "3000"
    # PostgREST exits on unrecoverable startup errors (e.g. the authenticator
    # role not existing yet on a pre-initdb volume) — keep restarting.
    restart: unless-stopped
    # No host port — only reachable by OPA via the Docker network.
    # SECURITY: this endpoint is unauthenticated (api_anon = full reader).
    # OPA is the mandatory front door; never publish this port.
    expose:
      - "3000"
    depends_on:
      authz-db:
        condition: service_healthy

  # Uncomment to enable the write API (JWT-authenticated, see OPA.md §13).
  postgrest-writer:
    image: postgrest/postgrest:v14.13
    environment:
      PGRST_DB_URI: postgres://authz_authenticator:authz@authz-db:5432/authz
      PGRST_DB_ANON_ROLE: api_anon
      PGRST_DB_SCHEMAS: authz
      PGRST_DB_POOL: "20"
      PGRST_DB_POOL_ACQUISITION_TIMEOUT: "10"
      PGRST_SERVER_PORT: "3001"
      PGRST_JWT_SECRET: "${PGRST_JWT_SECRET:-change-me-at-least-32-characters-long}"
      # Map role from a custom JWT claim (default: .role)
      # PGRST_JWT_ROLE_CLAIM_KEY: ".realm_access.roles[0]"
    restart: unless-stopped
    # No host port — only reachable via the writer-gateway.
    expose:
      - "3001"
    depends_on:
      authz-db:
        condition: service_healthy

  writer-gateway:
    image: nginx:1-alpine
    ports:
      - "3001:3001"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - postgrest-writer

  opa:
    image: openpolicyagent/opa:1.17.1
    command: run --server --watch --addr :8181 --authentication=token --authorization=basic /policies /data
    environment:
      OPA_ADMIN_TOKEN: "${OPA_ADMIN_TOKEN:-change-me-in-production}"
      JWT_ISSUER: "${JWT_ISSUER:-https://auth.example.com}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-authz-api}"
      DEFAULT_STORE: "${DEFAULT_STORE:-demo}"
      POSTGREST_URL: "${POSTGREST_URL:-http://postgrest:3000}"
      DEFAULT_CACHE_TTL_SECONDS: "${DEFAULT_CACHE_TTL_SECONDS:-1}"
      # CACHE_TTL_SECONDS: '{"demo":{"_default":5,"document":10}}'
    ports:
      - "8181:8181"
    volumes:
      - ./opa/policies:/policies:ro
      - ./opa/data:/data:ro
    depends_on:
      - postgrest

volumes:
  authz-db-data:
    name: authz-pg-db-data
