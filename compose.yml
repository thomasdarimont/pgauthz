services:

  authz-db:
    image: postgres:18.3
    command:
      - postgres
      - -c
      - max_connections=250
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=16MB
      - -c
      - random_page_cost=1.1
    environment:
      POSTGRES_USER: authz
      POSTGRES_PASSWORD: "${PG_PASSWORD:-authz}"
      POSTGRES_DB: authz
      # Passed to db/security/initdb/01_authenticator.sh to set the service
      # login-role passwords on first boot — must match the connection strings
      # below. Default to the dev password; override via .env (see .env.example).
      AUTHZ_AUTHENTICATOR_PASSWORD: "${AUTHZ_AUTHENTICATOR_PASSWORD:-authz}"
      AUTHZEN_DIRECT_PASSWORD: "${AUTHZEN_DIRECT_PASSWORD:-authz}"
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authz"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      # Named volume — no :z (that SELinux relabel flag is for bind mounts;
      # Docker manages a named volume's SELinux context itself).
      - authz-db-data:/var/lib/postgresql
      # Creates the authz_authenticator login role on first init, before
      # PostgREST connects (it exits if its login role is missing).
      - ./db/security/initdb:/docker-entrypoint-initdb.d:ro

  postgrest:
    image: postgrest/postgrest:v14.13
    environment:
      # Dedicated non-superuser authenticator (created by db/security/roles.sql).
      # Connecting as a superuser would bypass namespace access control.
      PGRST_DB_URI: postgres://authz_authenticator:${AUTHZ_AUTHENTICATOR_PASSWORD:-authz}@authz-db:5432/authz
      PGRST_DB_ANON_ROLE: api_anon
      PGRST_DB_SCHEMAS: authz
      PGRST_DB_POOL: "100"
      PGRST_DB_POOL_ACQUISITION_TIMEOUT: "10"
      PGRST_SERVER_PORT: "3000"
    # PostgREST exits on unrecoverable startup errors (e.g. the authenticator
    # role not existing yet on a pre-initdb volume) — keep restarting.
    restart: unless-stopped
    # No host port — only reachable by OPA via the Docker network.
    # SECURITY: this endpoint is unauthenticated (api_anon = full reader).
    # OPA is the mandatory front door; never publish this port.
    expose:
      - "3000"
    depends_on:
      authz-db:
        condition: service_healthy

  # Write API — fronted by OPA (see opa/policies/write.rego). The writer runs as
  # a FIXED authz_writer role and does NO JWT verification of its own: OPA is the
  # front door — it verifies the token, requires the configured writer role, and
  # forwards write/delete here, injecting the authenticated subject as the audit
  # author. Reachable only by OPA over the Docker network — never host-exposed,
  # so there is no nginx method-gate to maintain.
  postgrest-writer:
    image: postgrest/postgrest:v14.13
    environment:
      PGRST_DB_URI: postgres://authz_authenticator:${AUTHZ_AUTHENTICATOR_PASSWORD:-authz}@authz-db:5432/authz
      # Fixed role: every request OPA forwards runs as authz_writer (tuple
      # writes). authz_authenticator is a member of authz_writer (roles.sql).
      # No PGRST_JWT_SECRET — authentication/authorization happens in OPA.
      PGRST_DB_ANON_ROLE: authz_writer
      PGRST_DB_SCHEMAS: authz
      PGRST_DB_POOL: "20"
      PGRST_DB_POOL_ACQUISITION_TIMEOUT: "10"
      PGRST_SERVER_PORT: "3001"
    restart: unless-stopped
    # No host port — only OPA reaches this over the Docker network.
    expose:
      - "3001"
    depends_on:
      authz-db:
        condition: service_healthy

  opa:
    image: openpolicyagent/opa:1.17.1
    command: run --server --watch --addr :8181 --authentication=token --authorization=basic /policies /data
    environment:
      OPA_ADMIN_TOKEN: "${OPA_ADMIN_TOKEN:-change-me-in-production}"
      JWT_ISSUER: "${JWT_ISSUER:-https://auth.example.com}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-authz-api}"
      DEFAULT_STORE: "${DEFAULT_STORE:-demo}"
      POSTGREST_URL: "${POSTGREST_URL:-http://postgrest:3000}"
      # Writer instance OPA forwards authorized tuple writes to (write.rego).
      POSTGREST_WRITER_URL: "${POSTGREST_WRITER_URL:-http://postgrest-writer:3001}"
      DEFAULT_CACHE_TTL_SECONDS: "${DEFAULT_CACHE_TTL_SECONDS:-1}"
      # CACHE_TTL_SECONDS: '{"demo":{"_default":5,"document":10}}'
      # JWT role mapping for writes — match your issuer's claim shape:
      #   JWT_ROLES_CLAIM: "realm_access.roles"   # dotted path, default "roles"
      #   WRITER_ROLE:     "authz_writer"         # required role value
    ports:
      - "8181:8181"
    volumes:
      - ./opa/policies:/policies:ro
      - ./opa/data:/data:ro
    depends_on:
      - postgrest
      - postgrest-writer

volumes:
  authz-db-data:
    name: authz-pg-db-data
