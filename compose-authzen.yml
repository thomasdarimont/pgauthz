# pgauthzd instances — one binary. PGAUTHORIZER_PROFILE selects DB CAPABILITY
# (decision-only | full); the security guarantee is the DB connection ROLE, not
# the flag (a decision-only instance connects with a role that physically cannot
# write and asserts so at startup). Fronting an OPA policy sidecar is ORTHOGONAL
# to the profile — set OPA_URL and pgauthzd consults OPA for the AuthZEN
# /access/v1 surface; the native /pgauthz/v1 surface stays direct pgx.
#
#   pgauthzd-decision : decision-only      — AuthZEN + native reads (the default front door)
#   pgauthzd-full     : full (writer role) — native write front door; hosts the OPA write callback
#
# The default stack is OPA-FREE. The OPA-fronted gateway (pgauthzd-opa) + the OPA
# sidecar are the OPT-IN overlay compose-opa.yml — enable with ./start.sh --opa.

x-pgauthzd-build: &pgauthzd-build
  context: ./pgauthzd
  args:
    VERSION: ${VERSION:-dev}   # `VERSION=0.2.2 docker compose build` stamps it; else dev

services:

  # decision-only: direct pgx, read-only. Serves AuthZEN + native reads with no
  # OPA in the loop. The security boundary is the DB role, not the flag.
  pgauthzd-decision:
    build: *pgauthzd-build
    ports:
      - "8090:8080"
      - "9090:9090"   # Prometheus /metrics (ADR 0010) — demo convenience; don't host-expose in prod
    environment:
      LISTEN_ADDR: ":8080"
      METRICS_LISTEN_ADDR: ":9090"
      PGAUTHORIZER_PROFILE: "decision-only"
      # Dedicated non-superuser, read-only role (inherits authz_reader),
      # created by db/security/initdb on first init. Never use the authz
      # superuser here.
      DATABASE_URL: "postgres://authzen_direct:${AUTHZEN_DIRECT_PASSWORD:-authz}@authz-db:5432/authz"
      DB_POOL_MAX: "25"
      JWKS_FILE: "/jwks/jwks.json"
      JWT_ISSUER: "${JWT_ISSUER:-https://auth.example.com}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-authz-api}"
      # REQUIRED_SCOPE: "authz:read"  # If set, JWT must contain this scope
      DEFAULT_STORE: "${DEFAULT_STORE:-demo}"
      # SECURITY: token-only by default. Set ALLOW_SUBJECT_OVERRIDE=true ONLY
      # for trusted PEP/PDP deployments, where the caller is an enforcement
      # point evaluating access for arbitrary request-body subjects. In a
      # user-facing deployment leave it unset/false so the JWT subject is
      # authoritative (a mismatched body subject is rejected with 403). The
      # demo/test stack opts into true via env.sh — NOT this file — so this
      # compose is safe to copy to production as-is.
      ALLOW_SUBJECT_OVERRIDE: "${ALLOW_SUBJECT_OVERRIDE:-false}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    # Keep retrying until the authzen_direct role exists (created by
    # db/security/initdb on first boot, or by init.sh on re-init).
    restart: unless-stopped
    volumes:
      - ./opa/data:/jwks:ro
    depends_on:
      authz-db:
        condition: service_healthy

  # full: direct pgx, read+write. Connects with the writer-capable pgauthzd_rw
  # role and exposes the native write path (in addition to eval, search, explain,
  # watch). The read-only pgauthzd-decision above 403s on writes; the security
  # boundary is the DB role, not the profile flag.
  pgauthzd-full:
    build: *pgauthzd-build
    ports:
      - "8092:8080"
      # OPA callback listener (writer-capable, since this is the full profile).
      # OPA forwards authorized writes here. Published for the tests only — in
      # production bind to the OPA sidecar network.
      - "8094:8081"
      - "9091:9090"   # Prometheus /metrics (ADR 0010)
    environment:
      LISTEN_ADDR: ":8080"
      METRICS_LISTEN_ADDR: ":9090"
      PGAUTHORIZER_PROFILE: "full"
      # Writer-capable non-superuser role (inherits authz_writer), created by
      # db/security/roles.sql. This is the ONLY instance that can write.
      DATABASE_URL: "postgres://pgauthzd_rw:${PGAUTHZD_RW_PASSWORD:-authz}@authz-db:5432/authz"
      DB_POOL_MAX: "10"
      # Enable the OPA callback listener: because this is the full profile the
      # callback serves native reads AND writes (capability follows the role).
      INTERNAL_LISTEN_ADDR: ":8081"
      INTERNAL_SERVICE_TOKEN: "${NATIVE_SERVICE_TOKEN:-dev-native-service-token}"
      JWKS_FILE: "/jwks/jwks.json"
      JWT_ISSUER: "${JWT_ISSUER:-https://auth.example.com}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-authz-api}"
      DEFAULT_STORE: "${DEFAULT_STORE:-demo}"
      ALLOW_SUBJECT_OVERRIDE: "${ALLOW_SUBJECT_OVERRIDE:-false}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    restart: unless-stopped
    volumes:
      - ./opa/data:/jwks:ro
    depends_on:
      authz-db:
        condition: service_healthy

  # NOTE: pgauthzd-opa (the OPA-fronted AuthZEN gateway) is OPT-IN and lives in
  # compose-opa.yml — the default stack is OPA-free. Enable with ./start.sh --opa.
