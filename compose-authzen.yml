services:

  authzen-direct:
    build:
      context: ./pgauthzd
      args:
        BINARY: authzen-direct
        VERSION: ${VERSION:-dev}   # `VERSION=0.2.2 docker compose build` stamps it; else dev
    ports:
      - "8090:8080"
    environment:
      LISTEN_ADDR: ":8080"
      # Dedicated non-superuser, read-only role (inherits authz_reader),
      # created by db/security/initdb on first init. Never use the authz
      # superuser here.
      DATABASE_URL: "postgres://authzen_direct:${AUTHZEN_DIRECT_PASSWORD:-authz}@authz-db:5432/authz"
      DB_POOL_MAX: "25"
      JWKS_FILE: "/jwks/jwks.json"
      JWT_ISSUER: "${JWT_ISSUER:-https://auth.example.com}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-authz-api}"
      # REQUIRED_SCOPE: "authz:read"  # If set, JWT must contain this scope
      DEFAULT_STORE: "${DEFAULT_STORE:-demo}"
      # SECURITY: token-only by default. Set ALLOW_SUBJECT_OVERRIDE=true ONLY
      # for trusted PEP/PDP deployments, where the caller is an enforcement
      # point evaluating access for arbitrary request-body subjects. In a
      # user-facing deployment leave it unset/false so the JWT subject is
      # authoritative (a mismatched body subject is rejected with 403). The
      # demo/test stack opts into true via env.sh — NOT this file — so this
      # compose is safe to copy to production as-is.
      ALLOW_SUBJECT_OVERRIDE: "${ALLOW_SUBJECT_OVERRIDE:-false}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    # Keep retrying until the authzen_direct role exists (created by
    # db/security/initdb on first boot, or by init.sh on re-init).
    restart: unless-stopped
    volumes:
      - ./opa/data:/jwks:ro
    depends_on:
      authz-db:
        condition: service_healthy

  authzen-opa:
    build:
      context: ./pgauthzd
      args:
        BINARY: authzen-opa
        VERSION: ${VERSION:-dev}   # `VERSION=0.2.2 docker compose build` stamps it; else dev
    ports:
      - "8091:8080"
    environment:
      LISTEN_ADDR: ":8080"
      OPA_URL: "http://opa:8181"
      OPA_PACKAGE: "${OPA_PACKAGE:-authz}"
      JWKS_FILE: "/jwks/jwks.json"
      JWT_ISSUER: "${JWT_ISSUER:-https://auth.example.com}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-authz-api}"
      # REQUIRED_SCOPE: "authz:read"  # If set, JWT must contain this scope
      DEFAULT_STORE: "${DEFAULT_STORE:-demo}"
      # SECURITY: token-only by default (see authzen-direct above). The
      # demo/test stack opts into trusted-PEP mode via env.sh, not this file.
      ALLOW_SUBJECT_OVERRIDE: "${ALLOW_SUBJECT_OVERRIDE:-false}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - ./opa/data:/jwks:ro
    depends_on:
      - opa
