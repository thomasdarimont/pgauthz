services:

  authzen-direct:
    build:
      context: ./authzen
      args:
        BINARY: authzen-direct
    ports:
      - "8090:8080"
    environment:
      LISTEN_ADDR: ":8080"
      # Dedicated non-superuser, read-only role (inherits authz_reader),
      # created by db/security/initdb on first init. Never use the authz
      # superuser here.
      DATABASE_URL: "postgres://authzen_direct:authz@authz-db:5432/authz"
      DB_POOL_MAX: "25"
      JWKS_FILE: "/jwks/jwks.json"
      JWT_ISSUER: "${JWT_ISSUER:-https://auth.example.com}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-authz-api}"
      # REQUIRED_SCOPE: "authz:read"  # If set, JWT must contain this scope
      DEFAULT_STORE: "${DEFAULT_STORE:-demo}"
      # Trusted-PEP/PDP mode: the caller is a trusted enforcement point that
      # evaluates access for arbitrary subjects, so the request-body subject
      # is authoritative. Default is false (token-only) — leave it unset for
      # user-facing deployments where the JWT identifies the end user.
      ALLOW_SUBJECT_OVERRIDE: "${ALLOW_SUBJECT_OVERRIDE:-true}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    # Keep retrying until the authzen_direct role exists (created by
    # db/security/initdb on first boot, or by init.sh on re-init).
    restart: unless-stopped
    volumes:
      - ./opa/data:/jwks:ro
    depends_on:
      authz-db:
        condition: service_healthy

  authzen-opa:
    build:
      context: ./authzen
      args:
        BINARY: authzen-opa
    ports:
      - "8091:8080"
    environment:
      LISTEN_ADDR: ":8080"
      OPA_URL: "http://opa:8181"
      OPA_PACKAGE: "${OPA_PACKAGE:-authz}"
      JWKS_FILE: "/jwks/jwks.json"
      JWT_ISSUER: "${JWT_ISSUER:-https://auth.example.com}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-authz-api}"
      # REQUIRED_SCOPE: "authz:read"  # If set, JWT must contain this scope
      DEFAULT_STORE: "${DEFAULT_STORE:-demo}"
      # Trusted-PEP/PDP mode (see authzen-direct above). Default false
      # (token-only); unset it for user-facing deployments.
      ALLOW_SUBJECT_OVERRIDE: "${ALLOW_SUBJECT_OVERRIDE:-true}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - ./opa/data:/jwks:ro
    depends_on:
      - opa
