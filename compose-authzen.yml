services:

  authzen-direct:
    build:
      context: ./authzen
      args:
        BINARY: authzen-direct
    ports:
      - "8090:8080"
    environment:
      LISTEN_ADDR: ":8080"
      DATABASE_URL: "postgres://authz:authz@authz-db:5432/authz"
      DB_POOL_MAX: "25"
      JWKS_FILE: "/jwks/jwks.json"
      JWT_ISSUER: "${JWT_ISSUER:-https://auth.example.com}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-authz-api}"
      # REQUIRED_SCOPE: "authz:read"  # If set, JWT must contain this scope
      DEFAULT_STORE: "${DEFAULT_STORE:-demo}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - ./opa/data:/jwks:ro
    depends_on:
      authz-db:
        condition: service_healthy

  authzen-opa:
    build:
      context: ./authzen
      args:
        BINARY: authzen-opa
    ports:
      - "8091:8080"
    environment:
      LISTEN_ADDR: ":8080"
      OPA_URL: "http://opa:8181"
      OPA_PACKAGE: "${OPA_PACKAGE:-authz}"
      JWKS_FILE: "/jwks/jwks.json"
      JWT_ISSUER: "${JWT_ISSUER:-https://auth.example.com}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-authz-api}"
      # REQUIRED_SCOPE: "authz:read"  # If set, JWT must contain this scope
      DEFAULT_STORE: "${DEFAULT_STORE:-demo}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - ./opa/data:/jwks:ro
    depends_on:
      - opa
