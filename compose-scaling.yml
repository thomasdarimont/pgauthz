# Demonstrates horizontal scaling with PostgreSQL streaming replication.
#
# Topology:
#   authz-primary  — read-write PostgreSQL (receives all writes)
#   authz-replica  — read-only PostgreSQL (streams WAL from primary)
#   postgrest      — connects to the replica (read-only access checks)
#   opa            — policy engine calling PostgREST for access checks
#
# Writes (tuple management, model imports) go directly to the primary
# via application backends — not through OPA/PostgREST.
#
# Usage:
#   docker compose -f compose-scaling.yml up -d --wait
#   # Initialize schema on primary (replica streams it automatically):
#   COMPOSE_FILE=compose-scaling.yml ./init.sh
#   # Test via OPA:
#   curl -s http://localhost:8181/v1/data/authz/allow \
#     -d '{"input":{"subject":{"type":"internal_user","id":"alice"},"action":"can_read","resource":{"type":"document","id":"doc_payroll_001"}}}'
#
# Note: this is a demo setup. For production, use proper authentication,
# TLS, connection pooling, and a more robust replication setup.

services:

  # ── Primary PostgreSQL (read-write) ──────────────────────────────
  authz-primary:
    image: postgres:18.4
    command:
      - postgres
      - -c
      - max_connections=250
      - -c
      - shared_buffers=256MB
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=5
      - -c
      - hot_standby=on
    environment:
      POSTGRES_USER: authz
      POSTGRES_PASSWORD: authz
      POSTGRES_DB: authz
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authz"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - authz-primary-data:/var/lib/postgresql:z
      - ./db/scaling/init-replication-user.sh:/docker-entrypoint-initdb.d/01-replication-user.sh:ro

  # ── Read-only replica ────────────────────────────────────────────
  authz-replica:
    image: postgres:18.4
    environment:
      PGUSER: replicator
      PGPASSWORD: replicator
    ports:
      - "55434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authz"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      authz-primary:
        condition: service_healthy
    volumes:
      - authz-replica-data:/var/lib/postgresql:z
      - ./db/scaling/start-replica.sh:/start-replica.sh:ro
    entrypoint: /start-replica.sh

  # ── PostgREST on replica (read-only access checks) ──────────────
  postgrest:
    image: postgrest/postgrest:v14.13
    environment:
      PGRST_DB_URI: postgres://authz:authz@authz-replica:5432/authz
      PGRST_DB_ANON_ROLE: api_anon
      PGRST_DB_SCHEMAS: authz
      PGRST_DB_POOL: "100"
      PGRST_DB_POOL_ACQUISITION_TIMEOUT: "10"
      PGRST_SERVER_PORT: "3000"
    expose:
      - "3000"
    depends_on:
      authz-replica:
        condition: service_healthy

  # ── PostgREST on primary (write API, see OPA.md §13) ─────────────
  # Uncomment to enable the OPA-fronted write API (see docs/DEVELOPMENT.md).
  # The writer runs as a FIXED authz_writer role and does no JWT verification —
  # OPA verifies the token + writer role and forwards. Writes go to the primary.
  # postgrest-writer:
  #   image: postgrest/postgrest:v14.13
  #   environment:
  #     PGRST_DB_URI: postgres://authz_authenticator:${AUTHZ_AUTHENTICATOR_PASSWORD:-authz}@authz-primary:5432/authz
  #     PGRST_DB_ANON_ROLE: authz_writer   # fixed role; no JWT verification
  #     PGRST_DB_SCHEMAS: authz
  #     PGRST_DB_POOL: "20"
  #     PGRST_SERVER_PORT: "3001"
  #   expose:
  #     - "3001"            # internal only — reachable solely by OPA
  #   depends_on:
  #     authz-primary:
  #       condition: service_healthy
  # Then set on the opa service:  POSTGREST_WRITER_URL: "http://postgrest-writer:3001"

  # ── OPA (read-only access checks via replica) ───────────────────
  opa:
    image: openpolicyagent/opa:1.17.1
    command: run --server --watch --addr :8181 --authentication=token --authorization=basic /policies /data
    environment:
      OPA_ADMIN_TOKEN: "${OPA_ADMIN_TOKEN:-change-me-in-production}"
      JWT_ISSUER: "${JWT_ISSUER:-https://auth.example.com}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-authz-api}"
      DEFAULT_STORE: "${DEFAULT_STORE:-demo}"
      # Token-only reads by default (secure). The demo flow (init.sh sources
      # env.sh) exports REQUIRE_TOKEN_FOR_READS=false for tokenless trusted-PEP
      # checks; without this mapping OPA would deny the documented curl below.
      REQUIRE_TOKEN_FOR_READS: "${REQUIRE_TOKEN_FOR_READS:-true}"
      POSTGREST_URL: "${POSTGREST_URL:-http://postgrest:3000}"
      DEFAULT_CACHE_TTL_SECONDS: "${DEFAULT_CACHE_TTL_SECONDS:-1}"
      # CACHE_TTL_SECONDS: '{"demo":{"_default":5,"document":10}}'
    ports:
      - "8181:8181"
    volumes:
      - ./opa/policies:/policies:ro
      - ./opa/data:/data:ro
    depends_on:
      - postgrest

volumes:
  authz-primary-data:
    name: authz-pg-primary-data
  authz-replica-data:
    name: authz-pg-replica-data
