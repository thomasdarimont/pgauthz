ength="7.8267" x="23" y="393.7138">&#160;</text><text fill="#000000" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="352.1997" x="23" y="408.8466">Multi-app:&#160;a&#160;per-app&#160;DB&#160;role&#160;from&#160;a&#160;JWT&#160;claim</text><text fill="#000000" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="352.1997" x="23" y="423.9794">(DB_ROLE_CLAIM)&#160;&#8594;&#160;pgauthzd&#160;SET&#160;LOCAL&#160;ROLEs&#160;to</text><text fill="#000000" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="46.96" x="23" y="439.1122">it,&#160;so</text><text fill="#000000" font-family="monospace" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="148.7065" x="77.7866" y="439.1122">namespace&#160;isolation</text><text fill="#000000" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="125.2266" x="234.3198" y="439.1122">applies&#160;per&#160;app.</text></g><!--entity pg--><g class="entity" data-qualified-name="pg" data-source-line="33" id="ent0007"><path d="M673.46,577.17 C673.46,567.17 731.6036,567.17 731.6036,567.17 C731.6036,567.17 789.7471,567.17 789.7471,577.17 L789.7471,630.7638 C789.7471,640.7638 731.6036,640.7638 731.6036,640.7638 C731.6036,640.7638 673.46,640.7638 673.46,630.7638 L673.46,577.17" fill="#FFA500" style="stroke:#000000;stroke-width:1;"/><path d="M673.46,577.17 C673.46,587.17 731.6036,587.17 731.6036,587.17 C731.6036,587.17 789.7471,587.17 789.7471,577.17" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="monospace" font-size="14" lengthAdjust="spacing" textLength="84.2871" x="689.46" y="610.1651">PostgreSQL</text><text fill="#000000" font-family="monospace" font-size="14" lengthAdjust="spacing" textLength="59.001" x="689.46" y="626.462">primary</text></g><g class="entity" data-qualified-name="GMN13" data-source-line="45" id="ent0014"><path d="M539,681.77 L539,824.8325 A0,0 0 0 0 539,824.8325 L924.1997,824.8325 A0,0