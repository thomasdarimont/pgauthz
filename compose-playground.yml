# Optional overlay: the pgauthz playground (Lit SPA + Go BFF). Requires the
# keycloak overlay (proxy, realm, OPA) — `--playground` implies `--keycloak`.
#
#   ./start.sh --playground
#   (cd keycloak/terraform && terraform apply)   # provision the playground-bff client
#   open https://app.pgauthz.test
#
# /etc/hosts: 127.0.0.1 app.pgauthz.test  (the mkcert *.pgauthz.test cert covers it)
name: pgauthz

services:
  # Dedicated DB for BFF sessions, kept SEPARATE from the pgauthz engine DB.
  playground-db:
    image: postgres:18.4
    environment:
      POSTGRES_DB: pgauthz_playground
      POSTGRES_USER: playground
      POSTGRES_PASSWORD: ${PLAYGROUND_DB_PASSWORD:-playground}
    volumes:
      - playground-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playground -d pgauthz_playground"]
      interval: 5s
      timeout: 5s
      retries: 10

  playground-bff:
    build:
      # Context spans backend + frontend so the image bundles the SPA (self-contained).
      context: ./playground
      dockerfile: backend/Dockerfile
    image: pgauthz-playground-bff:dev
    depends_on:
      playground-db:
        condition: service_healthy
    environment:
      PG_DSN: postgres://playground:${PLAYGROUND_DB_PASSWORD:-playground}@playground-db:5432/pgauthz_playground
      CLIENT_ID: playground-bff
      CLIENT_SECRET: ${PLAYGROUND_BFF_CLIENT_SECRET:-playground-bff-demo-secret}
      # OIDC issuer for discovery (.well-known/openid-configuration) — the canonical
      # public issuer, reached through the proxy:443 via the extra_hosts mapping
      # below. Same value works for a standalone `docker run` (with --add-host).
      ISSUER: https://id.pgauthz.test/realms/pgauthz
      # Trust the mkcert dev root so the BFF can call the issuer over TLS. Unset in
      # production (real certificate); see the volume mount below.
      TLS_CA_FILE: /etc/pgauthz/rootCA.pem
      REDIRECT_URI: https://app.pgauthz.test/playground/auth/callback
      OPA_URL: http://opa:8181
      DEPLOYMENT_ENVIRONMENT: "${DEPLOYMENT_ENVIRONMENT:-dev}"
      # AuthZEN console proxies to the pgauthzd-opa service (requires compose-authzen.yml
      # to be up). Set empty to hide the AuthZEN tab.
      AUTHZEN_URL: http://pgauthzd-opa:8080
      BASE_URL: https://app.pgauthz.test
      # Path prefix the app is served under (one of several apps on this host).
      BASE_PATH: /playground
      COOKIE_SECURE: "true"
      # Explore mode (engine-direct, arbitrary-subject checks + model/tuple browsing).
      # Off by default in the BFF; the demo opts in. To restrict it to holders of a
      # Keycloak role, set PLAYGROUND_EXPLORE_ROLE (realm or client role).
      PLAYGROUND_EXPLORE_ENABLED: "true"
      # PLAYGROUND_EXPLORE_ROLE: pgauthz-explorer
      # UI hint mirroring pgauthzd-opa's SEARCH_REQUIRED_ROLE: the AuthZEN search
      # tabs are disabled for users without this role (the real gate is server-side).
      PLAYGROUND_SEARCH_ROLE: authzen_auditor
      # Dedicated read-only metadata/explore role (SELECT on the metadata tables +
      # EXECUTE on describe_model/check/explain) — NOT the engine superuser.
      ENGINE_DSN: postgres://authz_metadata:${PLAYGROUND_ENGINE_PASSWORD:-authz}@authz-db:5432/authz
    volumes:
      # SPA mounted for live editing; the binary serves it from /web.
      - ./playground/frontend:/web:ro
      # mkcert dev root, so the BFF trusts the proxy's TLS for the issuer (see TLS_CA_FILE).
      - ./keycloak/config/certs/rootCA.pem:/etc/pgauthz/rootCA.pem:ro
    extra_hosts:
      # Resolve the issuer's public hostname to the docker host (proxy :443),
      # mirroring how Keycloak reaches itself via the frontend URL.
      - "id.pgauthz.test:host-gateway"
    # Reached only through the proxy at app.pgauthz.test — no host port.

  # The AuthZEN console forwards the playground user's Keycloak token to pgauthzd-opa.
  # The demo pgauthzd-opa (compose-authzen.yml) trusts only the static demo issuer
  # (auth.example.com), so add Keycloak as a SECOND trusted issuer here — its Go
  # middleware is now multi-issuer (selects the validator by the token's `iss`).
  # The demo JWKS_FILE issuer stays intact, so test-authzen.sh keeps working.
  # JWKS is fetched over the internal network (keys are the same regardless of host);
  # the `iss` still validated is the public Keycloak URL.
  pgauthzd-opa:
    environment:
      JWT_ISSUERS: >-
        [{"issuer":"https://id.pgauthz.test/realms/pgauthz","jwks_url":"http://keycloak:8080/realms/pgauthz/protocol/openid-connect/certs"}]
      # Reverse-search endpoints (search/subject|resource|action) enumerate the
      # access graph, so gate them behind an auditor role. Roles are read from the
      # Keycloak realm + authz-api client claims (aggregated). Alice holds
      # authzen_auditor (see keycloak/terraform); other users get 403 on search.
      SEARCH_REQUIRED_ROLE: authzen_auditor
      JWT_ROLES_CLAIM: realm_access.roles,resource_access.authz-api.roles
      # Forward the verified token to OPA (input.token) so OPA re-validates it,
      # instead of forwarding only the resolved subject. Lets OPA run in the secure
      # REQUIRE_TOKEN_FOR_READS=true mode (see compose-keycloak.yml). Safe here
      # because the playground checks a user's own access (ALLOW_SUBJECT_OVERRIDE
      # unset → subject == token). Leave off for PEP setups that check arbitrary
      # subjects on behalf of others (those genuinely need tokenless subject-trust).
      FORWARD_TOKEN_TO_OPA: "true"

  # Add the app.pgauthz.test route to the keycloak overlay's nginx proxy.
  proxy:
    volumes:
      - ./playground/proxy.conf:/etc/nginx/conf.d/playground.conf:ro

volumes:
  playground-db-data:
