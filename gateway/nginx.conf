# Reverse proxy for the PostgREST writer instance.
#
# Only POST /rpc/<function> is forwarded.  Everything else — table
# endpoints, OpenAPI spec, wrong methods — gets a generic 404 with no
# schema information leaked.

server {
    listen 3001;
    server_name _;

    # Disable server tokens in responses.
    server_tokens off;

    # ── Allowed: POST to RPC functions ───────────────────────────────
    location /rpc/ {
        # Only POST is meaningful for a write API.
        limit_except POST {
            deny all;
        }

        proxy_pass         http://postgrest-writer:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward the Authorization header as-is.
        proxy_pass_request_headers on;

        # Hide PostgREST error details for routing failures (wrong
        # function name or parameter mismatch → 404 from PostgREST).
        # Legitimate RPC errors (401, 403, 500) pass through unchanged.
        proxy_intercept_errors on;
        error_page 404 = @not_found;
    }

    # ── Block everything else ────────────────────────────────────────
    location / {
        return 404 '{"message":"Not Found"}';
        default_type application/json;
    }

    # ── Generic 404 handler (suppresses PostgREST schema hints) ──────
    location @not_found {
        return 404 '{"message":"Not Found"}';
        default_type application/json;
    }
}
