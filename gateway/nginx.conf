# OPA edge proxy — TLS termination + optional X.509 client authentication (mTLS).
#
# PRODUCTION TEMPLATE — not wired into the default compose (the demo exposes OPA
# as plain HTTP on :8181). To use it: generate/mount certificates, run this nginx
# in front of OPA, and STOP publishing OPA's :8181 to the host so this edge is
# the only entry point. See docs/PRODUCTION.md → "Edge proxy / mTLS".
#
# Separation of concerns:
#   - mTLS here authenticates the *caller* (a trusted PEP / backend / service) at
#     the transport layer — "may this client reach OPA at all?".
#   - The application JWT still travels in the request body (input.token) and is
#     verified by OPA's policy — "who is the end user, and what may they do?".
# OPA's REST API does not surface request headers to the policy input, so caller
# authentication belongs here at the edge; per-user authorization stays in OPA.

server {
    listen 8443 ssl;
    http2  on;
    server_name _;
    server_tokens off;

    # --- TLS termination ---
    ssl_certificate     /certs/server.crt;
    ssl_certificate_key /certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --- X.509 client authentication (mTLS) ---
    # Trust anchor for client certificates. ssl_verify_client:
    #   optional — allow both; enforce per-location via $ssl_client_verify (below)
    #   on       — require a valid client cert for EVERY request (incl. /health)
    #   off      — TLS only, no client auth
    ssl_client_certificate /certs/client-ca.crt;
    ssl_verify_client      optional;
    ssl_verify_depth       2;

    # Health — open (no client cert), for liveness / readiness probes.
    location = /health {
        proxy_pass http://opa:8181/health;
    }

    location / {
        # Require a verified client certificate (mTLS) for the decision API.
        # Drop this guard (and set ssl_verify_client off) for TLS-only.
        if ($ssl_client_verify != SUCCESS) {
            return 403 '{"message":"client certificate required"}';
        }
        default_type application/json;

        proxy_pass         http://opa:8181;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Surface the verified caller identity for upstream logging / audit.
        proxy_set_header   X-Client-DN          $ssl_client_s_dn;
        proxy_set_header   X-Client-Verify      $ssl_client_verify;
        proxy_set_header   X-Client-Fingerprint $ssl_client_fingerprint;
    }
}
