# pgauthz demo Keycloak (26.6.4) — structural config.
# See https://www.keycloak.org/server/all-config
# Secrets, hostname and DB connection come from the environment
# (compose-keycloak.yml). This file holds only non-secret structural settings.

# Run HTTP behind the nginx proxy that terminates TLS for *.pgauthz.test.
http-enabled=true
proxy-headers=xforwarded

https-protocols=TLSv1.3,TLSv1.2

# Management endpoint (:9000) — used by the compose healthcheck (/health/ready).
health-enabled=true
metrics-enabled=true

# Log login/logout/token events to the console so demos are observable.
spi-events-listener--jboss-logging--success-level=info
spi-events-listener--jboss-logging--error-level=warn
