# TLS termination for *.pgauthz.test (mkcert), routing by hostname:
#   id.pgauthz.test / admin.pgauthz.test  -> Keycloak (OIDC issuer + admin)
#   api.pgauthz.test / pgauthz.test       -> OPA (the pgauthz API front door)

server_tokens off;

upstream keycloak { server keycloak:8080; }
upstream opa      { server opa:8181; }

# ── Keycloak (issuer + admin console) ────────────────────────────────────────
server {
    listen              443 ssl;
    server_name         id.pgauthz.test admin.pgauthz.test;

    ssl_certificate     /etc/tls/cert.pem;
    ssl_certificate_key /etc/tls/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_pass http://keycloak;
    }
}

# ── pgauthz API (OPA — the single front door) ────────────────────────────────
server {
    listen              443 ssl;
    server_name         api.pgauthz.test pgauthz.test;

    ssl_certificate     /etc/tls/cert.pem;
    ssl_certificate_key /etc/tls/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://opa;
    }
}
