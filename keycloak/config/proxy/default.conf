# TLS termination for *.pgauthz.test (mkcert), routing by hostname:
#   id.pgauthz.test / admin.pgauthz.test  -> Keycloak (OIDC issuer + admin)
#   api.pgauthz.test / pgauthz.test       -> pgauthzd (the AuthZEN 1.0 front door;
#                                            it consults OPA internally)
#
# Upstreams are referenced via a variable + Docker's embedded DNS resolver, so
# nginx re-resolves them per request. A static `upstream`/`proxy_pass host` is
# resolved once at startup, so a restarted backend (new container IP) 502s until
# nginx reloads — the variable form avoids that.

server_tokens off;

# ── Keycloak (issuer + admin console) ────────────────────────────────────────
server {
    listen              443 ssl;
    server_name         id.pgauthz.test admin.pgauthz.test;

    ssl_certificate     /etc/tls/cert.pem;
    ssl_certificate_key /etc/tls/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 ipv6=off;

    location / {
        set $upstream_kc keycloak;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_pass http://$upstream_kc:8080;
    }
}

# ── pgauthz API (pgauthzd — the AuthZEN 1.0 front door) ───────────────────────
# Routes to the OPA-fronted pgauthzd instance (compat gateway): it validates the
# Keycloak JWT and consults OPA, which calls back into pgauthzd's native engine
# callback. OPA is NOT exposed here — it is internal, reached only by pgauthzd.
server {
    listen              443 ssl;
    server_name         api.pgauthz.test pgauthz.test;

    ssl_certificate     /etc/tls/cert.pem;
    ssl_certificate_key /etc/tls/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 ipv6=off;

    location / {
        set $upstream_pgauthzd pgauthzd-opa;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$upstream_pgauthzd:8080;
    }
}
