# app.pgauthz.test → the playground BFF. Mounted into the keycloak overlay's
# nginx proxy when the playground overlay is active. TLS uses the same mkcert
# *.pgauthz.test cert; the upstream is resolved per request (Docker DNS) so a
# restarted BFF doesn't 502 the proxy.
server {
    listen              443 ssl;
    server_name         app.pgauthz.test;

    ssl_certificate     /etc/tls/cert.pem;
    ssl_certificate_key /etc/tls/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 ipv6=off;

    location / {
        set $upstream_bff playground-bff;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_pass http://$upstream_bff:8080;
    }
}
