apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "pgauthz.dbCluster" . }}
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.database.instances }}
  {{- with .Values.database.affinity }}
  # Pod scheduling for the DB instances — e.g. spread across availability
  # zones: { topologyKey: topology.kubernetes.io/zone }. Passed through to
  # CNPG's .spec.affinity (enablePodAntiAffinity, topologyKey,
  # podAntiAffinityType, nodeSelector, tolerations, ...).
  affinity:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  imageName: {{ include "pgauthz.image" .Values.images.postgres }}

  {{- if .Values.database.replication.synchronous.enabled }}
  {{- $min := int .Values.database.replication.synchronous.minSyncReplicas }}
  {{- $max := int .Values.database.replication.synchronous.maxSyncReplicas }}
  {{- if ge $max (int .Values.database.instances) }}
  {{- fail (printf "database.replication.synchronous.maxSyncReplicas (%d) must be < database.instances (%d): there must be a standby left to ack each commit" $max (int .Values.database.instances)) }}
  {{- end }}
  {{- if gt $min $max }}
  {{- fail (printf "database.replication.synchronous.minSyncReplicas (%d) must be <= maxSyncReplicas (%d)" $min $max) }}
  {{- end }}
  # Synchronous replication → commits wait for a standby ack (RPO 0 on failover).
  # CloudNativePG renders these into synchronous_standby_names as ANY <max> of the
  # standbys; minSyncReplicas <= maxSyncReplicas < instances (enforced above).
  minSyncReplicas: {{ $min }}
  maxSyncReplicas: {{ $max }}
  {{- end }}

  # No-superuser by default aligns with pgauthz's SECURITY DEFINER /
  # authz_owner model. Enabled here only so the migrations Job can CREATE ROLE
  # and REPLACE functions; CloudNativePG then exposes a <cluster>-superuser
  # secret consumed solely by that Job.
  enableSuperuserAccess: {{ .Values.database.enableSuperuserAccess }}

  postgresql:
    parameters:
      {{- range $k, $v := .Values.database.parameters }}
      {{ $k }}: {{ $v | quote }}
      {{- end }}

  bootstrap:
    initdb:
      database: authz
      owner: authz_owner          # non-superuser schema owner (roles.sql expects it)
      # Create the NOLOGIN privilege roles that the managed-role `inRoles` below
      # reference, AT BOOTSTRAP — before CloudNativePG reconciles the managed
      # roles. Without this, CNPG cannot create authzen_direct/pgauthzd_rw
      # ("role authz_reader does not exist") because their inRoles targets are
      # otherwise only created later by the migration Job — a fresh-install
      # deadlock. roles.sql re-creates these idempotently and adds the full grant
      # model. (postInit runs once, as superuser, only on first bootstrap.)
      postInitApplicationSQL:
        - CREATE ROLE api_anon NOLOGIN
        - CREATE ROLE authz_reader NOLOGIN
        - CREATE ROLE authz_writer NOLOGIN
        - CREATE ROLE authz_auditor NOLOGIN
        - CREATE ROLE authz_admin NOLOGIN

  # Declarative service-login roles: passwords come from Secrets and are
  # reconciled (rotated) by the operator. roles.sql still owns the privilege
  # model (GRANTs) — its IF NOT EXISTS guards skip re-creating these.
  managed:
    roles:
      - name: authzen_direct
        ensure: present
        comment: "read-only role: AuthZEN direct service + pgauthzd reader (decision-only)"
        login: true
        inherit: true             # inherits authz_reader (+ auditor per roles.sql)
        # CloudNativePG OWNS managed-role memberships and reconciles away any it
        # didn't grant — so the GRANTs roles.sql issues to this role get stripped
        # on the next reconcile. Declare them here as desired state instead. The
        # targets are created by the migration Job; CNPG retries until they exist.
        inRoles: [authz_reader]
        passwordSecret:
          name: {{ include "pgauthz.fullname" . }}-authzen-direct
      - name: pgauthzd_rw
        ensure: present
        comment: "writer role: pgauthzd writer (full profile) native write path"
        login: true
        inherit: true             # inherits authz_writer (+ auditor per roles.sql)
        inRoles: [authz_writer, authz_auditor]  # see note above — CNPG maintains these
        passwordSecret:
          name: {{ include "pgauthz.fullname" . }}-pgauthzd-rw
      {{- range .Values.extraRoles }}
      # App role for direct SQL access (bypasses OPA — a TRUSTED service that
      # does its own authn/authz). Inherits the function-API privileges of its
      # access tier; no raw table access. Point it at -ro (read) or -rw (write).
      - name: {{ .name }}
        ensure: present
        login: true
        inherit: {{ .inherit | default true }}
        inRoles: [{{ include "pgauthz.accessRole" .access }}]
        passwordSecret:
          # Secret names can't contain '_' (RFC 1123); PG role names can, so
          # sanitize for the resource name while the role keeps its real name.
          name: {{ if .existingSecret }}{{ .existingSecret }}{{ else }}{{ include "pgauthz.fullname" $ }}-extrarole-{{ .name | replace "_" "-" }}{{ end }}
      {{- end }}

  storage:
    size: {{ .Values.database.storage.size }}
    {{- with .Values.database.storage.storageClass }}
    storageClass: {{ . }}
    {{- end }}

  resources: {{- toYaml .Values.database.resources | nindent 4 }}

  {{- if .Values.database.backup.enabled }}
  backup:
    barmanObjectStore:
      destinationPath: {{ .Values.database.backup.destinationPath | quote }}
      {{- with .Values.database.backup.endpointURL }}
      endpointURL: {{ . | quote }}
      {{- end }}
      s3Credentials:
        accessKeyId:     { name: {{ .Values.database.backup.s3CredentialsSecret }}, key: ACCESS_KEY_ID }
        secretAccessKey: { name: {{ .Values.database.backup.s3CredentialsSecret }}, key: ACCESS_SECRET_KEY }
  {{- end }}
