apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pgauthz.fullname" . }}-postgrest
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  {{- if not .Values.postgrestReader.autoscaling.enabled }}
  replicas: {{ .Values.postgrestReader.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "pgauthz.name" . }}
      app.kubernetes.io/component: postgrest-reader
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "pgauthz.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: postgrest-reader
    spec:
      containers:
        - name: postgrest
          image: {{ include "pgauthz.image" .Values.images.postgrest }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            # SECURITY: this endpoint is unauthenticated (api_anon = full
            # reader). It has NO Service exposure beyond ClusterIP and is
            # reachable only by OPA (NetworkPolicy). Never add an Ingress.
            - name: PGAUTHZ_PW
              valueFrom:
                secretKeyRef: { name: {{ include "pgauthz.fullname" . }}-authenticator, key: password }
            - name: PGRST_DB_URI
              value: postgres://authz_authenticator:$(PGAUTHZ_PW)@{{ include "pgauthz.readerHost" . }}:5432/authz
            - { name: PGRST_DB_ANON_ROLE, value: api_anon }
            - { name: PGRST_DB_SCHEMAS,   value: authz }
            - { name: PGRST_DB_POOL,      value: {{ .Values.postgrestReader.dbPool | quote }} }
            - { name: PGRST_DB_POOL_ACQUISITION_TIMEOUT, value: "10" }
            - { name: PGRST_SERVER_PORT,  value: "3000" }
            - { name: PGRST_ADMIN_SERVER_PORT, value: "3010" }   # /live /ready
            # Per-app namespace isolation on reads: validates OPA's
            # X-Authz-Role header and SET LOCAL ROLEs to it (see
            # authz._pre_request_reader; no header -> api_anon, unchanged).
            - { name: PGRST_DB_PRE_REQUEST, value: authz._pre_request_reader }
            {{- if ne .Values.postgrestReader.target "rw" }}
            # Reads go to a replica/pooler. LISTEN/NOTIFY is rejected on a hot
            # standby ("cannot execute LISTEN during recovery"), so disable the
            # schema-cache notification channel here. Reload the cache on schema
            # changes by rolling these pods (or SIGUSR1) — the writer, which is
            # on the primary, keeps its listener.
            - { name: PGRST_DB_CHANNEL_ENABLED, value: "false" }
            {{- end }}
          ports:
            - { name: http,  containerPort: 3000 }
            - { name: admin, containerPort: 3010 }
          readinessProbe:
            httpGet: { path: /ready, port: 3010 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /live, port: 3010 }
            initialDelaySeconds: 10
          resources: {{- toYaml .Values.postgrestReader.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pgauthz.fullname" . }}-postgrest
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "pgauthz.name" . }}
    app.kubernetes.io/component: postgrest-reader
  ports:
    - { name: http, port: 3000, targetPort: 3000 }
{{- if .Values.postgrestReader.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "pgauthz.fullname" . }}-postgrest
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: {{ include "pgauthz.fullname" . }}-postgrest }
  minReplicas: {{ .Values.postgrestReader.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.postgrestReader.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: {{ .Values.postgrestReader.autoscaling.targetCPUUtilizationPercentage }} }
{{- end }}
