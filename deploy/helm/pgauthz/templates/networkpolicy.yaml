{{- if .Values.networkPolicies.enabled }}
{{- $name := include "pgauthz.name" . }}
{{- $full := include "pgauthz.fullname" . }}
# Default-deny ingress for all chart pods; the rules below re-open only the
# required paths. This is a core part of the security model: the pgauthzd
# reader/writer callback listeners bypass OPA's policy layer, so nothing but
# OPA may reach them.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $full }}-default-deny
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/name: {{ $name }} }
  policyTypes: [Ingress]
---
# pgauthzd reader callback (:8081): only OPA may connect. Egress to CNPG is
# unrestricted (this default-deny governs Ingress only), so the reader still
# reaches the read endpoint on 5432.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $full }}-reader-from-opa
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/name: {{ $name }}, app.kubernetes.io/component: pgauthzd-reader }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app.kubernetes.io/name: {{ $name }}, app.kubernetes.io/component: opa } }
      ports: [{ port: 8081 }]
---
# pgauthzd writer callback (:8081): only OPA may connect.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $full }}-writer-from-opa
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/name: {{ $name }}, app.kubernetes.io/component: pgauthzd-writer }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app.kubernetes.io/name: {{ $name }}, app.kubernetes.io/component: opa } }
      ports: [{ port: 8081 }]
{{- if .Values.authzen.opa.enabled }}
---
# OPA is an INTERNAL policy sidecar: only the pgauthzd OPA-fronted AuthZEN
# gateway may reach it (:8181). OPA is NOT the ingress front door — the ingress
# controller reaches pgauthzd, never OPA directly. (OPA is opt-in.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $full }}-opa-ingress
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/name: {{ $name }}, app.kubernetes.io/component: opa }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app.kubernetes.io/name: {{ $name }}, app.kubernetes.io/component: pgauthzd-opa } }
      ports: [{ port: 8181 }]
{{- end }}
{{- if .Values.authzen.direct.enabled }}
---
# AuthZEN direct API: the decision-only reader pods' :8080 listener. The reader's
# :8081 callback stays OPA-only (reader-from-opa above); this ADDS :8080 for the
# AuthZEN 1.0 API without touching that restriction (NetworkPolicies are additive).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $full }}-authzen-api-ingress
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/name: {{ $name }}, app.kubernetes.io/component: pgauthzd-reader }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {}
      ports: [{ port: 8080 }]
{{- end }}
{{- if .Values.authzen.opa.enabled }}
---
# pgauthzd OPA-fronted AuthZEN gateway (:8080): the ingress front door (path /).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $full }}-pgauthzd-opa-ingress
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/name: {{ $name }}, app.kubernetes.io/component: pgauthzd-opa }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {}
      ports: [{ port: 8080 }]
{{- end }}
{{- end }}
{{- if .Values.database.networkPolicy.enabled }}
{{- $name := include "pgauthz.name" . }}
{{- $full := include "pgauthz.fullname" . }}
---
# Gate SQL access to the PostgreSQL pods: only the allowed clients may reach
# 5432. CloudNativePG internals (operator namespace + same-cluster instances)
# are allowed on ALL ports so replication, status and metrics keep working.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $full }}-db-ingress
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: { cnpg.io/cluster: {{ include "pgauthz.dbCluster" . }} }
  policyTypes: [Ingress]
  ingress:
    # CloudNativePG operator + same-cluster instances (replication, failover,
    # status, metrics) — all ports, or the cluster breaks.
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: {{ .Values.database.networkPolicy.operatorNamespace }} }
        - podSelector:
            matchLabels: { cnpg.io/cluster: {{ include "pgauthz.dbCluster" . }} }
    # SQL clients (chart components + your extraRoles apps) on 5432 only.
    - from:
        - podSelector: { matchLabels: { app.kubernetes.io/name: {{ $name }} } }
        {{- range .Values.database.networkPolicy.allowedClientSelectors }}
        - podSelector: {{- toYaml . | nindent 12 }}
        {{- end }}
      ports: [{ port: 5432 }]
{{- end }}
