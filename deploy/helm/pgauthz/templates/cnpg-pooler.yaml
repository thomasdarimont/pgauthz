{{- if .Values.pooler.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: {{ include "pgauthz.dbPoolerRO" . }}
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  cluster:
    name: {{ include "pgauthz.dbCluster" . }}
  instances: {{ .Values.pooler.instances }}
  type: ro                      # pooled connections to the read replicas
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "1000"
      default_pool_size: "25"
{{- end }}
