{{- /*
AuthZEN 1.0 HTTP API surface (optional) — both variants are pgauthzd PROFILES of
the single pgauthzd image, not separate binaries.

  direct  (authzen.direct.enabled) — the AuthZEN 1.0 API served straight from
          PostgreSQL. This is the SAME decision-only pgauthzd process as the
          reader callback (one binary, two listeners: :8081 = OPA callback,
          :8080 = AuthZEN/JWT API). The Deployment lives in pgauthzd.yaml; this
          file only publishes a Service for the reader pods' :8080 listener.
  opa     (authzen.opa.enabled) — a DB-less pgauthzd instance (decision-only +
          OPA_URL) that fronts OPA on /access/v1 (policy-enriched AuthZEN). It
          only talks to OPA (no DATABASE_URL); OPA in turn calls back into the
          reader/writer callbacks. When enabled it is the ingress front door (/).
*/ -}}
{{- if .Values.authzen.direct.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pgauthz.fullname" . }}-authzen
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  # Backed by the decision-only pgauthzd (the reader) pods; :8080 is their
  # AuthZEN 1.0 / JWT listener.
  selector:
    app.kubernetes.io/name: {{ include "pgauthz.name" . }}
    app.kubernetes.io/component: pgauthzd-reader
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
{{- end }}
{{- if .Values.authzen.opa.enabled }}
{{- if .Values.authzen.direct.enabled }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pgauthz.fullname" . }}-pgauthzd-opa
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.authzen.opa.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "pgauthz.name" . }}
      app.kubernetes.io/component: pgauthzd-opa
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "pgauthz.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: pgauthzd-opa
    spec:
      containers:
        - name: pgauthzd
          image: {{ include "pgauthz.image" .Values.images.pgauthzd }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            # DB-less OPA-AuthZEN gateway: OPA_URL fronts OPA on /access/v1 for
            # policy-enriched AuthZEN. No DATABASE_URL — the graph data comes from
            # OPA, which calls back into the reader/writer native callbacks.
            # (Fronting OPA is orthogonal to the profile; the profile is nominal
            # here since there's no local DB to assert a role on.)
            - { name: PGAUTHORIZER_PROFILE, value: decision-only }
            - { name: LISTEN_ADDR, value: ":8080" }
            - name: OPA_URL
              value: http://{{ include "pgauthz.fullname" . }}-opa:8181
            - { name: JWKS_FILE,   value: /jwks/jwks.json }
            - { name: JWT_ISSUER,   value: {{ .Values.opa.jwtIssuer | quote }} }
            - { name: JWT_AUDIENCE, value: {{ .Values.opa.jwtAudience | quote }} }
            - { name: DEFAULT_STORE, value: {{ .Values.opa.defaultStore | quote }} }
            - { name: ALLOW_SUBJECT_OVERRIDE, value: "false" }
            {{- with .Values.authzen.opa.deploymentEnvironment }}
            # input.deployment.environment for policy hooks (ADR 0011).
            - { name: DEPLOYMENT_ENVIRONMENT, value: {{ . | quote }} }
            {{- end }}
          ports: [{ name: http, containerPort: 8080 }]
          readinessProbe: { httpGet: { path: /readyz, port: 8080 }, initialDelaySeconds: 5 }
          livenessProbe:  { httpGet: { path: /livez, port: 8080 }, initialDelaySeconds: 10 }
          volumeMounts:
            - { name: jwks, mountPath: /jwks, readOnly: true }
      volumes:
        - name: jwks
          configMap: { name: {{ include "pgauthz.fullname" . }}-opa-data }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pgauthz.fullname" . }}-pgauthzd-opa
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "pgauthz.name" . }}
    app.kubernetes.io/component: pgauthzd-opa
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
{{- end }}
