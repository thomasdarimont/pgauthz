{{- if .Values.ingress.enabled }}
{{- $full := include "pgauthz.fullname" . }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $full }}
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # pgauthzd is the front door (AuthZEN 1.0 /access/v1). OPA is an
          # internal policy sidecar (ClusterIP) — never ingress-exposed; the
          # pgauthzd gateway consults it and OPA calls back into the reader/
          # writer native callbacks. Route to the OPA-fronted AuthZEN gateway
          # when enabled (policy-enriched), else the direct AuthZEN reader.
          - path: /
            pathType: Prefix
            backend:
              service:
                {{- if .Values.authzen.opa.enabled }}
                name: {{ $full }}-pgauthzd-opa
                {{- else }}
                name: {{ $full }}-authzen
                {{- end }}
                port: { number: 8080 }
{{- end }}
