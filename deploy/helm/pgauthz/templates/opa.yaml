{{- /* OPA is OPT-IN: deployed only when the OPA-fronted gateway is enabled.
       The default stack is OPA-free (the direct reader is the front door). */ -}}
{{- if .Values.authzen.opa.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pgauthz.fullname" . }}-opa
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  {{- if not .Values.opa.autoscaling.enabled }}
  replicas: {{ .Values.opa.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "pgauthz.name" . }}
      app.kubernetes.io/component: opa
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "pgauthz.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: opa
      annotations:
        # Roll pods when policies change.
        checksum/policies: {{ .Files.Glob "files/opa/policies/*.rego" | toString | sha256sum }}
    spec:
      {{- if or .Values.opa.extraPoliciesConfigMap .Values.opa.storePoliciesConfigMaps .Values.opa.extraLibsConfigMap }}
      # Deploy-time hook gate (ADR 0011), two initContainers:
      #  1. hook PURITY — each hook dir compiled against the hooks-v1 capability
      #     allowlist, so a non-pure builtin (http.send, io.*, opa.*,
      #     time.now_ns) fails the pod, not just a syntax error.
      #  2. assembled set — the whole /policies tree type-checks together.
      # This is a deploy-time backstop; the FULL contract (namespace pinning,
      # cross-package/dynamic-data isolation, duplicate names) is enforced by
      # scripts/validate-hooks.sh in the CI / bundle build. DELEGATED tenant
      # hooks must be delivered as a signed, pre-validated immutable bundle —
      # see ADR 0011 (a mutable ConfigMap + --watch is not an isolation boundary).
      initContainers:
        - name: opa-check-hook-purity
          image: {{ include "pgauthz.image" .Values.images.opa }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          # `opa check` takes multiple paths — check every hook dir against the
          # capability allowlist in one shell-free invocation.
          args:
            - check
            - --capabilities=/caps/hooks-v1-capabilities.json
            {{- if .Values.opa.extraPoliciesConfigMap }}
            - /hooks/global
            {{- end }}
            {{- if .Values.opa.extraLibsConfigMap }}
            - /hooks-lib
            {{- end }}
            {{- range $store, $cm := .Values.opa.storePoliciesConfigMaps }}
            - /hooks/stores/{{ $store }}
            {{- end }}
          volumeMounts:
            - { name: hook-caps, mountPath: /caps, readOnly: true }
            {{- if .Values.opa.extraPoliciesConfigMap }}
            - { name: extra-policies, mountPath: /hooks/global, readOnly: true }
            {{- end }}
            {{- if .Values.opa.extraLibsConfigMap }}
            - { name: extra-libs, mountPath: /hooks-lib, readOnly: true }
            {{- end }}
            {{- range $store, $cm := .Values.opa.storePoliciesConfigMaps }}
            - { name: {{ include "pgauthz.storeHooksVolume" $store }}, mountPath: /hooks/stores/{{ $store }}, readOnly: true }
            {{- end }}
        - name: opa-check-assembled
          image: {{ include "pgauthz.image" .Values.images.opa }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          args: ["check", "--ignore=.*", "/policies"]
          volumeMounts:
            - { name: policies, mountPath: /policies, readOnly: true }
            {{- if .Values.opa.extraPoliciesConfigMap }}
            - { name: extra-policies, mountPath: /policies/hooks/global, readOnly: true }
            {{- end }}
            {{- if .Values.opa.extraLibsConfigMap }}
            - { name: extra-libs, mountPath: /policies/hooks-lib, readOnly: true }
            {{- end }}
            {{- range $store, $cm := .Values.opa.storePoliciesConfigMaps }}
            - { name: {{ include "pgauthz.storeHooksVolume" $store }}, mountPath: /policies/hooks/stores/{{ $store }}, readOnly: true }
            {{- end }}
      {{- end }}
      containers:
        - name: opa
          image: {{ include "pgauthz.image" .Values.images.opa }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          args:
            - run
            - --server
            - --addr=:8181
            - --authentication=token
            - --authorization=basic
            # ConfigMap mounts expose ..data / ..<timestamp> symlink dirs;
            # without this OPA's recursive loader double-loads every policy
            # ("multiple default rules"). Ignore dot-prefixed entries.
            - --ignore=.*
            {{- if .Values.opa.decisionLogsConsole }}
            # DEV ONLY (see values.yaml): logs full decision inputs incl. JWTs.
            - --set=decision_logs.console=true
            {{- end }}
            - /policies
            - /data
          env:
            - name: OPA_ADMIN_TOKEN
              valueFrom:
                secretKeyRef: { name: {{ include "pgauthz.secretName" . }}, key: opa-admin-token }
            - { name: JWT_ISSUER,   value: {{ .Values.opa.jwtIssuer | quote }} }
            - { name: JWT_AUDIENCE, value: {{ .Values.opa.jwtAudience | quote }} }
            - { name: DEFAULT_STORE, value: {{ .Values.opa.defaultStore | quote }} }
            - { name: REQUIRE_TOKEN_FOR_READS, value: {{ .Values.opa.requireTokenForReads | quote }} }
            {{- if .Values.opa.hookFilteredEnumeration }}
            # ADR 0011: filter enumeration per candidate through the applicable
            # decision hooks (supersedes the refusal AND the superset opt-out).
            - { name: HOOK_FILTERED_ENUMERATION, value: "true" }
            - { name: HOOK_FILTER_MAX_CANDIDATES, value: {{ .Values.opa.hookFilterMaxCandidates | quote }} }
            {{- end }}
            {{- with .Values.opa.hookActorClaims }}
            - { name: HOOK_ACTOR_CLAIMS, value: {{ . | quote }} }
            {{- end }}
            {{- if .Values.opa.rolesSourcePrefix }}
            - { name: JWT_ROLES_SOURCE_PREFIX, value: "true" }
            {{- end }}
            {{- if .Values.opa.allowUnfilteredEnumerationWithHooks }}
            # ADR 0011: opt OUT of the secure default — with policy hooks
            # loaded, search enumeration returns graph-derived SUPERSETS that
            # hooks do not filter. Only set when hooks are advisory, not
            # confidentiality rules.
            - { name: ALLOW_UNFILTERED_ENUMERATION_WITH_HOOKS, value: "true" }
            {{- end }}
            - { name: DEFAULT_CACHE_TTL_SECONDS, value: {{ .Values.opa.defaultCacheTtlSeconds | quote }} }
            # Native pgauthzd callbacks: reads → the decision-only reader's
            # callback listener, writes → the full writer's. The shared service
            # token proves the call came from this OPA (matches the instances'
            # INTERNAL_SERVICE_TOKEN).
            - name: NATIVE_URL
              value: http://{{ include "pgauthz.fullname" . }}-reader:8081
            - name: NATIVE_WRITE_URL
              value: http://{{ include "pgauthz.fullname" . }}-writer:8081
            - name: NATIVE_SERVICE_TOKEN
              valueFrom:
                secretKeyRef: { name: {{ include "pgauthz.secretName" . }}, key: native-service-token }
            {{- with .Values.opa.writerRole }}
            - { name: WRITER_ROLE, value: {{ . | quote }} }
            {{- end }}
            {{- with .Values.opa.jwtRolesClaim }}
            - { name: JWT_ROLES_CLAIM, value: {{ . | quote }} }
            {{- end }}
            {{- with .Values.opa.dbRoleClaim }}
            - { name: DB_ROLE_CLAIM, value: {{ . | quote }} }
            {{- end }}
          ports:
            - { name: http, containerPort: 8181 }
          readinessProbe:
            httpGet: { path: /health, port: 8181 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8181 }
            initialDelaySeconds: 10
          resources: {{- toYaml .Values.opa.resources | nindent 12 }}
          volumeMounts:
            - { name: policies, mountPath: /policies, readOnly: true }
            {{- if .Values.opa.extraPoliciesConfigMap }}
            # Global policy hooks (ADR 0011): packages authz.hooks.v1.global.*
            # that veto decisions/writes for every store.
            - { name: extra-policies, mountPath: /policies/hooks/global, readOnly: true }
            {{- end }}
            {{- if .Values.opa.extraLibsConfigMap }}
            # Operator extension library (authz.hooks.lib.v1.ext.*).
            - { name: extra-libs, mountPath: /policies/hooks-lib, readOnly: true }
            {{- end }}
            {{- range $store, $cm := .Values.opa.storePoliciesConfigMaps }}
            # Store-scoped hooks for {{ $store }} (authz.hooks.v1.stores.{{ $store }}.*).
            - { name: {{ include "pgauthz.storeHooksVolume" $store }}, mountPath: /policies/hooks/stores/{{ $store }}, readOnly: true }
            {{- end }}
            # subPath → a REAL file at /data/jwks.json (not a ConfigMap symlink
            # into ..data/). OPA derives a data document's path from its
            # directory, so the JWKS must sit directly in the load root for
            # authn.rego's `data.keys` to resolve (a symlinked path lands the
            # document under the wrong key and JWT verification fails closed).
            - { name: data, mountPath: /data/jwks.json, subPath: jwks.json, readOnly: true }
      volumes:
        - name: policies
          configMap: { name: {{ include "pgauthz.fullname" . }}-opa-policies }
        {{- if .Values.opa.extraPoliciesConfigMap }}
        - name: extra-policies
          configMap: { name: {{ .Values.opa.extraPoliciesConfigMap }} }
        {{- end }}
        {{- if .Values.opa.extraLibsConfigMap }}
        - name: extra-libs
          configMap: { name: {{ .Values.opa.extraLibsConfigMap }} }
        {{- end }}
        {{- range $store, $cm := .Values.opa.storePoliciesConfigMaps }}
        - name: {{ include "pgauthz.storeHooksVolume" $store }}
          configMap: { name: {{ $cm }} }
        {{- end }}
        {{- if or .Values.opa.extraPoliciesConfigMap .Values.opa.storePoliciesConfigMaps .Values.opa.extraLibsConfigMap }}
        - name: hook-caps
          configMap: { name: {{ include "pgauthz.fullname" . }}-opa-hook-caps }
        {{- end }}
        - name: data
          configMap: { name: {{ include "pgauthz.fullname" . }}-opa-data }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pgauthz.fullname" . }}-opa
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "pgauthz.name" . }}
    app.kubernetes.io/component: opa
  ports:
    - { name: http, port: 8181, targetPort: 8181 }
{{- if .Values.opa.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "pgauthz.fullname" . }}-opa
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: {{ include "pgauthz.fullname" . }}-opa }
  minReplicas: {{ .Values.opa.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.opa.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: {{ .Values.opa.autoscaling.targetCPUUtilizationPercentage }} }
{{- end }}
{{- end }}
