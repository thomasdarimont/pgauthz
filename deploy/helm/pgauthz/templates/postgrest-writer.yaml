apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pgauthz.fullname" . }}-postgrest-writer
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.postgrestWriter.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "pgauthz.name" . }}
      app.kubernetes.io/component: postgrest-writer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "pgauthz.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: postgrest-writer
    spec:
      containers:
        - name: postgrest
          image: {{ include "pgauthz.image" .Values.images.postgrest }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            # Fixed authz_writer role; OPA is the front door (verifies the JWT
            # + writer role and forwards). Writes go to the PRIMARY (-rw).
            # Reachable only by OPA — never host-exposed.
            - name: PGAUTHZ_PW
              valueFrom:
                secretKeyRef: { name: {{ include "pgauthz.fullname" . }}-authenticator, key: password }
            - name: PGRST_DB_URI
              value: postgres://authz_authenticator:$(PGAUTHZ_PW)@{{ include "pgauthz.dbRW" . }}:5432/authz
            - { name: PGRST_DB_ANON_ROLE, value: authz_writer }
            - { name: PGRST_DB_SCHEMAS,   value: authz }
            - { name: PGRST_DB_POOL,      value: {{ .Values.postgrestWriter.dbPool | quote }} }
            - { name: PGRST_DB_POOL_ACQUISITION_TIMEOUT, value: "10" }
            - { name: PGRST_SERVER_PORT,  value: "3001" }
            - { name: PGRST_ADMIN_SERVER_PORT, value: "3011" }
            # Per-app namespace isolation: assumes the app role OPA forwards in
            # the X-Authz-Role header (no-op when absent).
            - { name: PGRST_DB_PRE_REQUEST, value: authz._pre_request }
          ports:
            - { name: http,  containerPort: 3001 }
            - { name: admin, containerPort: 3011 }
          readinessProbe:
            httpGet: { path: /ready, port: 3011 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /live, port: 3011 }
            initialDelaySeconds: 10
          resources: {{- toYaml .Values.postgrestWriter.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pgauthz.fullname" . }}-postgrest-writer
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "pgauthz.name" . }}
    app.kubernetes.io/component: postgrest-writer
  ports:
    - { name: http, port: 3001, targetPort: 3001 }
