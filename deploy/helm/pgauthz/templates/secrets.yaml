{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pgauthz.secretName" . }}
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
type: Opaque
stringData:
  # opa-admin-token guards OPA's admin API; native-service-token is the shared
  # SERVICE credential OPA presents to the pgauthzd reader/writer callback
  # listeners (matching their INTERNAL_SERVICE_TOKEN).
  opa-admin-token: {{ .Values.secrets.opaAdminToken | quote }}
  native-service-token: {{ .Values.secrets.nativeServiceToken | quote }}
---
# basic-auth secrets for CloudNativePG managed roles (username + password).
# authzen_direct — read-only role for the AuthZEN direct service AND the
# pgauthzd reader (decision-only) callback.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pgauthz.fullname" . }}-authzen-direct
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: authzen_direct
  password: {{ .Values.secrets.authzenDirectPassword | quote }}
---
# pgauthzd_rw — writer role for the pgauthzd writer (full) callback.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pgauthz.fullname" . }}-pgauthzd-rw
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: pgauthzd_rw
  password: {{ .Values.secrets.pgauthzdRwPassword | quote }}
{{- end }}
{{- /* basic-auth secrets for extraRoles that don't reference an existingSecret */}}
{{- range .Values.extraRoles }}
{{- if not .existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pgauthz.fullname" $ }}-extrarole-{{ .name | replace "_" "-" }}
  labels: {{- include "pgauthz.labels" $ | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .name }}
  password: {{ required (printf "extraRoles[%s]: set either 'password' or 'existingSecret'" .name) .password | quote }}
{{- end }}
{{- end }}
