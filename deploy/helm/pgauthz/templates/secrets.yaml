{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pgauthz.secretName" . }}
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Consumed by CloudNativePG managed.roles (password rotation) and by the
  # PostgREST / AuthZEN connection strings. CloudNativePG expects a Secret of
  # type kubernetes.io/basic-auth per managed role, so we also emit those below.
  opa-admin-token: {{ .Values.secrets.opaAdminToken | quote }}
---
# basic-auth secrets for CloudNativePG managed roles (username + password).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pgauthz.fullname" . }}-authenticator
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: authz_authenticator
  password: {{ .Values.secrets.authenticatorPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pgauthz.fullname" . }}-authzen-direct
  labels: {{- include "pgauthz.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: authzen_direct
  password: {{ .Values.secrets.authzenDirectPassword | quote }}
{{- end }}
{{- /* basic-auth secrets for extraRoles that don't reference an existingSecret */}}
{{- range .Values.extraRoles }}
{{- if not .existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pgauthz.fullname" $ }}-extrarole-{{ .name | replace "_" "-" }}
  labels: {{- include "pgauthz.labels" $ | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .name }}
  password: {{ required (printf "extraRoles[%s]: set either 'password' or 'existingSecret'" .name) .password | quote }}
{{- end }}
{{- end }}
