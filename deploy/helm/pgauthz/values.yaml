# Default values for pgauthz.
# Secure-by-default: pgauthzd (the AuthZEN 1.0 front door) is the only
# externally reachable service; OPA is an internal policy sidecar, and the
# pgauthzd reader/writer native callbacks and PostgreSQL are ClusterIP-only,
# locked down with NetworkPolicies. Override the dev secrets before any real
# deployment.

nameOverride: ""
fullnameOverride: ""

# -- Images. The migrations + pgauthzd images are built from this repo (see
# deploy/migrations/Dockerfile and pgauthzd/Dockerfile) and must be pushed to a
# registry your cluster can pull from (or imported into a local cluster).
images:
  pullPolicy: IfNotPresent
  postgres:   { repository: ghcr.io/cloudnative-pg/postgresql, tag: "18.4" }
  opa:        { repository: openpolicyagent/opa,               tag: "1.18.2" }
  migrations: { repository: pgauthz-migrations,                tag: "0.12.0" }
  # pgauthzd — the single unified daemon. Behaviour is selected per Deployment by
  # PGAUTHORIZER_PROFILE (decision-only | full) — DB capability — plus the
  # orthogonal OPA_URL flag (front OPA on /access/v1). ONE image serves the
  # decision-only reader + AuthZEN API, the full writer, and the OPA-fronted
  # AuthZEN gateway.
  pgauthzd:   { repository: pgauthz-pgauthzd,                  tag: "0.12.0" }

# ── Database: CloudNativePG cluster ──────────────────────────────────────────
database:
  # Pod scheduling for the DB instances (CNPG .spec.affinity passthrough).
  # For multi-AZ: spread instances across zones so an AZ loss takes at most
  # one instance:
  # affinity:
  #   enablePodAntiAffinity: true
  #   topologyKey: topology.kubernetes.io/zone
  #   podAntiAffinityType: required
  instances: 3                 # 1 primary + 2 replicas → -rw and -ro services
  # ── High availability / failover ──────────────────────────────────────────
  # CloudNativePG ALREADY does automatic failover when instances >= 2: it
  # promotes a healthy standby to primary and repoints the -rw Service, so the
  # writer/migrations/OPA-writer (all connect to -rw) reconnect transparently.
  # During the promotion window (seconds) writes fail — clients must retry.
  #
  # This block only controls the RPO (data-loss) guarantee, i.e. whether a
  # commit is acknowledged BEFORE a standby has the data:
  #   off  (default) → ASYNCHRONOUS: fast writes, but commits not yet shipped to
  #                    a standby are lost if the primary dies (small RPO > 0).
  #   on             → SYNCHRONOUS: a commit waits for a standby ack → an acked
  #                    grant/revoke is never lost on failover (RPO 0), at the
  #                    cost of some write latency. Recommended for an authz store.
  #
  # maxSyncReplicas must be < instances. With instances: 3, maxSyncReplicas: 1
  # means a commit waits for ANY 1 of the 2 standbys → RPO 0, and a single node
  # loss still leaves a sync candidate so writes keep flowing.
  # minSyncReplicas: 0 keeps writes available if ALL standbys are down (async
  # fallback, availability > RPO). Set it to 1 for STRICT RPO 0 — writes then
  # block rather than ack data they could not replicate.
  replication:
    synchronous:
      enabled: false
      minSyncReplicas: 0
      maxSyncReplicas: 1
  storage:
    size: 10Gi
    storageClass: ""           # "" = cluster default (local-path on k3d)
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { memory: 1Gi }
  # Postgres tuning — mirrors the compose `command` flags.
  parameters:
    max_connections: "250"
    shared_buffers: 256MB
    effective_cache_size: 768MB
    work_mem: 16MB
    random_page_cost: "1.1"
  # Optional NetworkPolicy gating ingress to the PostgreSQL pods on 5432, so only
  # known clients (the chart's components + the selectors below) can open SQL
  # connections. OFF by default. CAUTION: locking the database pods can break
  # CloudNativePG internals if your CNI enforces policies on operator/kubelet
  # traffic — the policy allows the cnpg-system namespace and same-cluster pods
  # on all ports for that reason; test in your environment before relying on it.
  networkPolicy:
    enabled: false
    operatorNamespace: cnpg-system
    # Extra pod selectors allowed to reach 5432 (e.g. your extraRoles apps).
    allowedClientSelectors: []
      # - matchLabels: { pgauthz.io/db-client: "true" }
  # The migrations Job needs a role that can CREATE ROLE + REPLACE functions.
  # CloudNativePG exposes its superuser secret only when this is enabled; the
  # Job is its only consumer. (No-superuser alternative: run the SQL via
  # bootstrap.initdb.postInitApplicationSQLRefs — see the chart README.)
  enableSuperuserAccess: true
  # statement_timeout applied to the service login roles (parity with init.sh).
  conditionStatementTimeout: ""   # e.g. "60s"
  # Continuous backups to object storage (Barman). Off by default; strongly
  # recommended in production — the audit log is the system of record.
  backup:
    enabled: false
    destinationPath: ""        # e.g. s3://my-bucket/pgauthz
    endpointURL: ""
    s3CredentialsSecret: ""    # Secret with ACCESS_KEY_ID / SECRET_ACCESS_KEY

# ── Extra service login roles (direct SQL clients) ───────────────────────────
# For applications that connect to PostgreSQL directly (SQL) and call the
# authz.* function API, bypassing OPA. Each becomes a CloudNativePG managed role
# that inherits the privileges of its access tier — function-API access only, no
# raw table access. Point the app at the -ro Service for reads, -rw for writes.
#
# SECURITY: a direct DB connection bypasses OPA's JWT/policy layer, so these are
# TRUSTED services that do their own authn/authz (like the AuthZEN direct API). Never
# hand DB credentials to untrusted/end-user clients — route those through OPA.
extraRoles: []
  # - name: reporting_app
  #   access: read              # read | readwrite | audit | admin
  #   password: "change-me"     # chart creates a kubernetes.io/basic-auth Secret
  #   # existingSecret: my-secret  # OR reference an existing basic-auth Secret
  #   # inherit: true

# ── Schema install / migration Job ───────────────────────────────────────────
migrations:
  # Run the migrate Job on `helm upgrade` as well as install. NON-DESTRUCTIVE:
  # the Job applies only pending forward-only migrations from db/migrations/
  # (tracked in public._sqlx_migrations) and reloads the idempotent engine code
  # (CREATE OR REPLACE …) — no DROP SCHEMA, stores/tuples/audit are preserved.
  # Keep true so upgrades actually pick up new migrations and code; set false to
  # pin the schema and run migrations out of band.
  runOnUpgrade: true

# PgBouncer pooler in front of the read replicas, so the stateless reader fleet
# does not exhaust max_connections (replicas x PGRST_DB_POOL must stay under it).
pooler:
  enabled: true
  instances: 2

# ── Secrets ──────────────────────────────────────────────────────────────────
# DEV DEFAULTS — override every value here for any real deployment, ideally via
# an external secret store (External Secrets Operator / Vault) and existingSecret.
secrets:
  existingSecret: ""           # if set, the chart creates no Secret and reads keys from it
  authzenDirectPassword: "authz"    # authzen_direct login (read-only: reader + AuthZEN direct)
  pgauthzdRwPassword: "authz"       # pgauthzd_rw login (writer, full profile)
  opaAdminToken: "change-me-in-production"
  # Shared SERVICE credential OPA presents to the pgauthzd reader/writer callback
  # listeners (Authorization: Bearer). MUST be overridden for real deployments.
  nativeServiceToken: "change-me-in-production"

# ── OPA: the single front door ───────────────────────────────────────────────
opa:
  replicas: 2
  # Read into the rego at startup via opa.runtime().env (same as compose).
  jwtIssuer: "https://auth.example.com"
  jwtAudience: "authz-api"
  defaultStore: "demo"
  # SECURITY: token-only reads. Keep true unless a trusted PEP fronts OPA.
  requireTokenForReads: true
  defaultCacheTtlSeconds: 1
  # JWT → writer-role mapping (see opa/policies/write.rego). Match your issuer.
  writerRole: ""               # e.g. "authz_writer"
  jwtRolesClaim: ""            # e.g. "realm_access.roles,resource_access.authz-api.roles"
  dbRoleClaim: ""              # e.g. "db_role" — per-app namespace isolation
                               # (X-PGAuthz-Role on writer AND reader calls)
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { memory: 256Mi }
  autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 6, targetCPUUtilizationPercentage: 70 }
  # JWKS for JWT verification. Replace the demo keys with your IdP's JWKS
  # (or point OPA's authn at a JWKS URL instead of this file).
  jwks: ""                     # "" = use files/opa/data/jwks.json from the chart

# ── pgauthzd reader — native decision path (internal only, fronted by OPA) ────
# decision-only profile: read-only DB role (authzen_direct → authz_reader).
# Serves OPA's native READ callbacks; replaces the PostgREST reader.
reader:
  replicas: 3
  dbPoolMax: 20                # replicas x dbPoolMax must stay < max_connections
  # Route reads at the pooler (replicas) by default. Set to "rw" to send reads
  # to the primary when read-your-writes freshness matters more than scale-out
  # (the project deliberately has no consistency tokens; replica lag + the OPA
  # cache TTL are the staleness window).
  target: "pooler-ro"          # one of: pooler-ro | ro | rw
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { memory: 256Mi }
  autoscaling: { enabled: true, minReplicas: 3, maxReplicas: 10, targetCPUUtilizationPercentage: 70 }

# ── pgauthzd writer — native write path (internal only, fronted by OPA) ───────
# full profile: writer DB role (pgauthzd_rw → authz_writer). Serves OPA's native
# WRITE callbacks (and reads); targets the primary (-rw). Replaces PostgREST writer.
writer:
  replicas: 2
  dbPoolMax: 10
  # synchronous_commit for the writer's connections. "remote_apply" (default)
  # means a grant/revoke only acks once every synchronous standby has APPLIED
  # it — combined with database.replication.synchronous, no replica in the
  # sync set can serve a stale allow after a revoke ack. No-op when
  # synchronous replication is off. Set "local" to opt out (e.g. bulk loads
  # go through a separate channel anyway).
  synchronousCommit: remote_apply
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { memory: 256Mi }

# ── AuthZEN 1.0 API surface (optional) ───────────────────────────────────────
# Both surfaces are pgauthzd profiles of the ONE pgauthzd image — no separate
# services/images.
authzen:
  # direct — the AuthZEN 1.0 API served straight from PostgreSQL (no OPA). This
  # is the SAME decision-only pgauthzd process as the reader callback (one binary,
  # two listeners): enabling it only publishes a Service (+ NetworkPolicy) for the
  # reader pods' :8080 AuthZEN/JWT listener. Scales with reader.replicas.
  direct:
    enabled: true
  # opa — OPT-IN policy-as-code. When enabled, deploys the OPA sidecar + a DB-less
  # pgauthzd gateway (decision-only + OPA_URL) that fronts OPA on /access/v1, and
  # the gateway becomes the ingress front door (path /). Default OFF: the stack is
  # OPA-free and the direct reader (authzen.direct) is the front door; the engine's
  # conditions (SQL/CEL) cover ABAC. Enable only for Rego policy-as-code.
  opa:
    enabled: false
    replicas: 2
  # Deprecated/no-op: the ingress `/` now always routes to the pgauthzd AuthZEN
  # front door (the OPA-fronted gateway when authzen.opa.enabled, else the direct
  # reader). Kept for backwards compatibility with existing values overrides.
  exposeViaIngress: false

# ── Metrics (ADR 0010) ───────────────────────────────────────────────────────
# When enabled, each pgauthzd (reader + writer) serves Prometheus /metrics on a
# dedicated container port + Service port (never the client/ingress path). A
# ServiceMonitor (Prometheus Operator) can then scrape it.
metrics:
  enabled: false
  port: 9090
  serviceMonitor:
    enabled: false            # requires the Prometheus Operator CRD
    interval: 30s
    labels: {}                # extra labels so your Prometheus's serviceMonitorSelector matches

# ── Ingress ──────────────────────────────────────────────────────────────────
# Only the pgauthzd AuthZEN front door is exposed (the direct reader by default,
# or the OPA-fronted gateway when authzen.opa.enabled). OPA + Postgres never.
ingress:
  enabled: true
  className: ""                # "traefik" on k3d
  host: pgauthz.local
  annotations: {}
  tls: { enabled: false, secretName: "" }

# Default-deny NetworkPolicies + explicit allow rules. Keep enabled — this is a
# core part of the security model (the pgauthzd callbacks are policy-free behind OPA).
networkPolicies:
  enabled: true
