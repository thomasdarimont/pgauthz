# Grafana datasource provisioning for the demo metrics overlay (ADR 0010):
# points Grafana at the overlay's Prometheus. Anonymous admin is enabled on the
# Grafana service, so the demo needs no login.
apiVersion: 1
datasources:
  - name: Prometheus
    uid: prometheus            # stable UID the provisioned dashboard references
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
