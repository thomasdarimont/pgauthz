# Demonstrates selective logical replication for local authorization checks.
#
# Two approaches side by side:
#
# 1. Full authz replica (accounting-app-db):
#    Receives authz schema + functions + selective tuple partitions.
#    Can run check_access() locally against replicated tuples.
#    Trade-off: must deploy authz schema to the app DB.
#
# 2. Derived permissions (accounting-app-derived-db):
#    Receives only a flat materialized_permissions lookup table.
#    No authz schema or functions needed — just a simple EXISTS query.
#    Trade-off: permissions are pre-computed, slight lag on changes.
#
# Topology:
#   authz-primary              — read-write PostgreSQL (central authz database)
#   accounting-app-db          — full authz replica (selective tuple partitions)
#   accounting-app-derived-db  — derived replica (flat permissions table only)
#
# Usage:
#   docker compose -f compose-replication.yml up -d --wait
#   ./db/replication/init-replication.sh
#
# Note: this is a demo setup. For production, use proper authentication,
# TLS, connection pooling, and monitor replication lag.

services:

  # ── Central authz database (read-write, publishes changes) ─────────
  authz-primary:
    image: postgres:18.4
    command:
      - postgres
      - -c
      - max_connections=100
      - -c
      - shared_buffers=256MB
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=25
      - -c
      # Each subscription uses one permanent slot, plus one temporary slot
      # per table during initial sync. Increase when adding more subscribers.
      - max_replication_slots=10
    environment:
      POSTGRES_USER: authz
      POSTGRES_PASSWORD: authz
      POSTGRES_DB: authz
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authz"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - authz-primary-logical-data:/var/lib/postgresql:z
      - ./db/replication/init-primary.sh:/docker-entrypoint-initdb.d/01-init-primary.sh:ro

  # ── Accounting app database (subscribes to accounting-relevant tuples) ──
  accounting-app-db:
    image: postgres:18.4
    command:
      - postgres
      - -c
      - max_connections=100
      - -c
      - shared_buffers=256MB
      - -c
      # Sync multiple tables in parallel during initial subscription copy.
      # Default is 2; increase to match the number of published tables.
      - max_sync_workers_per_subscription=10
    environment:
      POSTGRES_USER: authz
      POSTGRES_PASSWORD: authz
      POSTGRES_DB: authz
    ports:
      - "55435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authz"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      authz-primary:
        condition: service_healthy
    volumes:
      - accounting-app-db-data:/var/lib/postgresql:z

  # ── Accounting app with derived permissions (no authz schema needed) ──
  accounting-app-derived-db:
    image: postgres:18.4
    command:
      - postgres
      - -c
      - max_connections=100
      - -c
      - shared_buffers=256MB
      - -c
      - max_sync_workers_per_subscription=10
    environment:
      POSTGRES_USER: authz
      POSTGRES_PASSWORD: authz
      POSTGRES_DB: authz
    ports:
      - "55436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authz"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      authz-primary:
        condition: service_healthy
    volumes:
      - accounting-app-derived-data:/var/lib/postgresql:z

volumes:
  authz-primary-logical-data:
    name: authz-pg-primary-logical-data
  accounting-app-db-data:
    name: authz-pg-accounting-app-data
  accounting-app-derived-data:
    name: authz-pg-accounting-app-derived-data
