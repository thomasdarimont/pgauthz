# OpenAPI description of pgauthzd's HTTP surface: the native /pgauthz/v1 API
# and the AuthZEN 1.0 /access/v1 API (plus health + discovery).
#
# This file is the CONTRACT: it is embedded into the binary and served at
# GET /pgauthz/v1/openapi.{json,yaml}, and openapi_test.go enforces it against
# the code — every path here must resolve in the router, every registered
# route must appear here, and handler responses are validated against the
# schemas. Change the API and the tests force this file to follow (and vice
# versa).
#
# Availability by deployment mode (THIS FILE describes the full surface; the
# SERVED document is instance-accurate — an OPA-fronted instance omits the
# native paths its public listener does not register):
#   - AuthZEN /access/v1: always on the public listener.
#   - Native /pgauthz/v1 reads: public listener only when NOT fronting OPA
#     (no OPA_URL); always on the internal callback listener.
#   - Native /pgauthz/v1 writes: full profile only (decision-only → 403);
#     on the public listener additionally gated by the WRITER_ROLE claim.
#   - The internal callback listener authenticates with the shared service
#     token (and optional mTLS), not the end-user JWT, and additionally
#     honors the X-PGAuthz-Role header from its trusted OPA upstream.
#
# Native operations carry a machine-readable `x-pgauthz-availability`
# extension: `listeners` (where the operation exists), `public_listener:
# not-when-opa-fronted`, and `profile: full` on writes — so generators and
# scanners can tell instance-conditional operations from universal ones.
openapi: 3.0.3
info:
  title: pgauthzd
  description: >
    PostgreSQL-native Zanzibar-style authorization over HTTP: the pgauthz
    native API (raw graph decisions, search, explain, watch, tuple writes)
    and the AuthZEN 1.0 access evaluation/search API.
  # Placeholder — replaced at startup with the build version (the same value
  # build_info reports); see api.SetOpenAPIVersion.
  version: 0.0.0-dev
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

# Default: the public listener's end-user/service JWT. Native operations
# additionally accept the shared service token — that is how the SAME paths
# are authenticated on the internal callback listener (declared per
# operation below as bearerAuth OR serviceToken). Discovery, health, and this
# document are public (security: []).
security:
  - bearerAuth: []

tags:
  - name: authzen
    description: AuthZEN 1.0 access evaluation and search (spec-pure surface).
  - name: native-read
    description: >
      Native pgauthz reads — raw ReBAC graph answers, policy-free by
      construction. Point reads honor the freshness protocol — see the
      X-PGAuthz-Consistency header.
  - name: native-write
    description: >
      Native pgauthz writes (full profile). Successful writes mint a freshness
      token (X-PGAuthz-Revision) when FRESHNESS_TOKEN_KEYS is configured.
  - name: meta
    description: Health, discovery, and this document.

paths:
  # ── AuthZEN 1.0 ────────────────────────────────────────────────────────────
  /access/v1/evaluation:
    post:
      tags: [authzen]
      operationId: evaluation
      summary: Single access evaluation (AuthZEN §5)
      parameters:
        - $ref: '#/components/parameters/StoreHeader'
        - $ref: '#/components/parameters/DetailHeader'
        - $ref: '#/components/parameters/ConsistencyHeader'
        - $ref: '#/components/parameters/RevisionHeader'
      requestBody: { $ref: '#/components/requestBodies/Evaluation' }
      responses:
        '200': { $ref: '#/components/responses/EvaluationOK' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/FreshnessConflict' }
        '500': { $ref: '#/components/responses/ServerError' }
  /stores/{store}/access/v1/evaluation:
