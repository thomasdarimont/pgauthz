  /.well-known/authzen-configuration/stores/{store}:
    get:
      tags: [meta]
      operationId: wellKnownStoreInserted
      summary: AuthZEN PDP metadata for one store (§9.2 tenant form)
      description: >
        AuthZEN 1.0 §9.2: the well-known URI is inserted between host and the
        tenant path, so discovery for the PDP identified by /stores/{store}
        lives here.
      security: []
      parameters:
        - $ref: '#/components/parameters/StorePath'
      responses:
